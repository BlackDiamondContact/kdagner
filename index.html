<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Dagner - Contact Info</title>
    <style>
        :root {
            --primary-color: #000000; /* Change to Black Diamond's specific blue/orange if preferred */
            --bg-color: #f4f4f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        .logo {
            width: 120px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            margin: 10px 0 5px;
            color: var(--primary-color);
        }
        p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="Black Diamond Logo" class="logo">

        <h1>Kevin Dagner</h1>
        <p>Inventory and Payables Manager<br>Black Diamond Plumbing & Mechanical</p>

        <a href="kdagner.vcf" class="btn" id="download-btn">Save Contact</a>

        <div class="footer">
            Scan to add to your address book
        </div>
    </div>

    <script>
        // Optional: Auto-triggers download on page load
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('download-btn').click();
            }, 1000);
        };
    </script>
</body>
</html>
